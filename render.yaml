services:
  - type: web
    name: alquileres-isem-api
    runtime: docker
    dockerfilePath: api/Dockerfile
    dockerContext: api
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: APP_URL
        sync: false
      - key: APP_URLS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: FILE_STORAGE_MODE
        value: CLOUD_STORAGE
      - key: LOCAL_STORAGE_ROOT
        value: /tmp/ISEM_ARCHIVOS
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: isem-documentos
      - key: ALERT_DAYS_BEFORE_DUE
        value: 3
      - key: CONTRACT_ALERT_DAYS_BEFORE_DUE
        value: 3
