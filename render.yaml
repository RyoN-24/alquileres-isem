services:
  - type: web
    name: alquileres-isem-api
    runtime: node
    rootDir: api
    plan: starter
    buildCommand: npm install && npm run prisma:generate && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: APP_URL
        sync: false
      - key: APP_URLS
        sync: false
      - key: DATABASE_URL
        value: file:/tmp/isem.db
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: FILE_STORAGE_MODE
        value: LOCAL_VISIBLE
      - key: LOCAL_STORAGE_ROOT
        value: /tmp/ISEM_ARCHIVOS
      - key: ALERT_DAYS_BEFORE_DUE
        value: 3
      - key: CONTRACT_ALERT_DAYS_BEFORE_DUE
        value: 3
